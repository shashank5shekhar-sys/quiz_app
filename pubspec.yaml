name: quiz_app
description: A complete online quiz app with Firebase backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0

  # Image Picker
  image_picker: ^1.1.2

  # UI & Utilities
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  fluttertoast: ^8.2.6
  lottie: ^3.1.2
  shared_preferences: ^2.3.0
  provider: ^6.1.2
  uuid: ^4.4.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
